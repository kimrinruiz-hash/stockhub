
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockHub Cebu • Inventory Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }

        .nav-link { transition: all 0.2s; }
        .nav-link.active { background-color: rgb(234 179 8); color: black; border-radius: 9999px; }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-[radial-gradient(at_bottom_right,#ca8a04_0%,transparent_70%)]">
        <div class="max-w-md w-full mx-4">
            <div class="bg-zinc-900 rounded-3xl shadow-2xl p-10 border border-yellow-500/20">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center gap-3 mb-4">
                        <div class="w-12 h-12 bg-yellow-500 rounded-2xl flex items-center justify-center text-black">
                            <i class="fa-solid fa-boxes-stacked text-2xl"></i>
                        </div>
                        <h1 class="logo-font text-4xl font-semibold tracking-tighter">StockHub</h1>
                    </div>
                    <p class="text-zinc-400">Cebu Inventory System</p>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-2">Username</label>
                        <input id="username" type="text" value="admin" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-500 text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-2">Password</label>
                        <input id="password" type="password" value="admin123" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-500 text-white">
                    </div>
                    
                    <button onclick="login()" class="w-full bg-yellow-500 hover:bg-yellow-400 transition-colors text-black font-semibold py-4 rounded-2xl text-lg">
                        Sign In
                    </button>
                </div>
            </div>
            <div class="text-center mt-6 text-zinc-500 text-sm">
                Created by Kim Ruiz • Cebu, Philippines
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex">
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-yellow-500 rounded-2xl flex items-center justify-center text-black">
                        <i class="fa-solid fa-boxes-stacked"></i>
                    </div>
                    <div>
                        <span class="logo-font text-3xl font-semibold tracking-tighter">StockHub</span>
                        <p class="text-xs text-zinc-500">CEBU • PHILIPPINES</p>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 p-4 overflow-y-auto">
                <nav class="space-y-1">
                    <a onclick="navigateTo('dashboard')" class="nav-link active flex items-center gap-3 px-4 py-3 text-sm font-medium cursor-pointer"><i class="fa-solid fa-chart-line w-5"></i><span>Dashboard</span></a>
                    <a onclick="navigateTo('products')" class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium cursor-pointer"><i class="fa-solid fa-list w-5"></i><span>Products</span></a>
                    <a onclick="navigateTo('movements')" class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium cursor-pointer"><i class="fa-solid fa-arrows-up-down w-5"></i><span>Movements</span></a>
                    <a onclick="navigateTo('reports')" class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium cursor-pointer"><i class="fa-solid fa-file-lines w-5"></i><span>Reports</span></a>
                </nav>
            </div>
            
            <div class="p-4 border-t border-zinc-800">
                <div class="flex items-center gap-3 bg-zinc-800 rounded-2xl p-3">
                    <div class="w-9 h-9 bg-zinc-700 rounded-xl flex items-center justify-center text-lg">👷</div>
                    <div class="flex-1">
                        <div class="text-sm font-medium">Kim Ruiz</div>
                        <div class="text-xs text-emerald-400">Admin • Cebu</div>
                    </div>
                    <button onclick="logout()" class="text-zinc-400 hover:text-white"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <header class="bg-zinc-900 border-b border-zinc-800 px-8 py-5 flex items-center justify-between">
                <div id="page-title" class="text-2xl font-semibold">Dashboard</div>
                
                <div class="flex items-center gap-6">
                    <div class="relative">
                        <input id="search-input" type="text" placeholder="Search products..." 
                               class="bg-zinc-800 border border-zinc-700 focus:border-yellow-500 rounded-full pl-10 pr-4 py-3 w-80 text-sm focus:outline-none">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-zinc-500"></i>
                    </div>
                    <button onclick="showAddProductModal()" class="flex items-center gap-2 bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-3 rounded-2xl font-medium">
                        <i class="fa-solid fa-plus"></i> New Product
                    </button>
                </div>
            </header>
            
            <div class="flex-1 overflow-auto p-8 bg-zinc-950" id="content-area"></div>
        </div>
    </div>

    <div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-lg mx-4 p-8">
            <h2 id="modal-title" class="text-2xl font-semibold mb-6">Add Product</h2>
            <input type="hidden" id="edit-id">
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">Product Name</label>
                    <input id="prod-name" type="text" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-zinc-400 mb-1">SKU</label>
                        <input id="prod-sku" type="text" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                    </div>
                    <div>
                        <label class="block text-xs text-zinc-400 mb-1">Category</label>
                        <select id="prod-category" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                            <option>Electronics</option>
                            <option>Clothing</option>
                            <option>Home & Kitchen</option>
                            <option>Tools</option>
                            <option>Groceries</option>
                            <option>Others</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-zinc-400 mb-1">Quantity</label>
                        <input id="prod-qty" type="number" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                    </div>
                    <div>
                        <label class="block text-xs text-zinc-400 mb-1">Price (₱)</label>
                        <input id="prod-price" type="number" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">Description</label>
                    <textarea id="prod-desc" rows="3" class="w-full bg-zinc-800 rounded-3xl px-5 py-4"></textarea>
                </div>
            </div>
            
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700">Cancel</button>
                <button onclick="saveProduct()" class="flex-1 py-4 bg-yellow-500 text-black font-semibold rounded-2xl">Save</button>
            </div>
        </div>
    </div>

    <div id="movement-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md mx-4 p-8">
            <h2 class="text-2xl font-semibold mb-6">New Stock Movement</h2>
            <div class="space-y-5">
                <select id="move-product" class="w-full bg-zinc-800 rounded-2xl px-5 py-3"></select>
                <select id="move-type" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                    <option value="IN">Stock In (+)</option>
                    <option value="OUT">Stock Out (-)</option>
                </select>
                <input id="move-qty" type="number" placeholder="Quantity" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                <textarea id="move-note" rows="2" placeholder="Notes (optional)" class="w-full bg-zinc-800 rounded-3xl px-5 py-4"></textarea>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeMovementModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700">Cancel</button>
                <button onclick="saveMovement()" class="flex-1 py-4 bg-yellow-500 text-black font-semibold rounded-2xl">Record Movement</button>
            </div>
        </div>
    </div>

    <script>
        let products = [];
        let movements = [];

        function loadData() {
            const savedProducts = localStorage.getItem('stockhub_products');
            const savedMovements = localStorage.getItem('stockhub_movements');
            
            if (savedProducts) products = JSON.parse(savedProducts);
            else {
                products = [
                    {id:1, name:"Wireless Earbuds Pro", sku:"SH-2025-001", category:"Electronics", qty:23, price:2499, desc:"Noise cancelling Bluetooth earbuds"},
                    {id:2, name:"Stainless Steel Tumbler", sku:"SH-2025-002", category:"Home & Kitchen", qty:8, price:899, desc:"Keeps drinks cold for 24hrs"},
                    {id:3, name:"Cordless Drill Kit", sku:"SH-2025-003", category:"Tools", qty:45, price:3299, desc:"18V professional kit"}
                ];
            }
            
            if (savedMovements) movements = JSON.parse(savedMovements);
        }

        function saveData() {
            localStorage.setItem('stockhub_products', JSON.stringify(products));
            localStorage.setItem('stockhub_movements', JSON.stringify(movements));
        }

        function login() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            loadDashboard();
        }

        function logout() {
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        function navigateTo(page) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => {
                if (l.getAttribute('onclick').includes(page)) l.classList.add('active');
            });

            document.getElementById('page-title').textContent = 
                page === 'dashboard' ? 'Dashboard' : 
                page === 'products' ? 'All Products' : 
                page === 'movements' ? 'Stock Movements' : 'Reports';

            if (page === 'dashboard') loadDashboard();
            else if (page === 'products') loadProductsPage();
            else if (page === 'movements') loadMovementsPage();
            else if (page === 'reports') loadReportsPage();
        }

        function loadDashboard() {
            const area = document.getElementById('content-area');
            const lowStock = products.filter(p => p.qty < 15);
            let totalValue = products.reduce((sum, p) => sum + (p.qty * p.price), 0);

            area.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="bg-zinc-900 rounded-3xl p-6 card-hover">
                        <div class="text-sm text-zinc-400">Total Products</div>
                        <div class="text-5xl font-semibold mt-2">${products.length}</div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6 card-hover">
                        <div class="text-sm text-zinc-400">Total Value</div>
                        <div class="text-5xl font-semibold mt-2">₱${totalValue.toLocaleString('en-PH')}</div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6 card-hover">
                        <div class="text-sm text-zinc-400">Low Stock</div>
                        <div class="text-5xl font-semibold mt-2 text-orange-400">${lowStock.length}</div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6 card-hover">
                        <div class="text-sm text-zinc-400">Movements</div>
                        <div class="text-5xl font-semibold mt-2">${movements.length}</div>
                    </div>
                </div>
            `;
        }

        function loadProductsPage() {
            const area = document.getElementById('content-area');
            area.innerHTML = `<div class="bg-zinc-900 rounded-3xl overflow-hidden"><table class="w-full"><thead><tr class="border-b border-zinc-800"><th class="p-6 text-left">Product</th><th class="p-6 text-left">SKU</th><th class="p-6 text-left">Category</th><th class="p-6 text-right">Stock</th><th class="p-6 text-right">Price</th><th class="p-6 w-32"></th></tr></thead><tbody id="table-body"></tbody></table></div>`;
            renderProductsTable();
        }

        function renderProductsTable() {
            const tbody = document.getElementById('table-body');
            let html = '';
            products.forEach(p => {
                html += `<tr class="border-b border-zinc-800 hover:bg-zinc-800/50"><td class="p-6 font-medium cursor-pointer" onclick="viewProduct(${p.id})">${p.name}</td><td class="p-6">${p.sku}</td><td class="p-6">${p.category}</td><td class="p-6 text-right ${p.qty < 15 ? 'text-orange-400 font-bold' : ''}">${p.qty}</td><td class="p-6 text-right">₱${p.price}</td><td class="p-6"><button onclick="editProduct(${p.id}); event.stopImmediatePropagation();" class="px-4 py-1 text-xs border border-yellow-500/30 hover:bg-yellow-500 hover:text-black rounded-xl">Edit</button></td></tr>`;
            });
            tbody.innerHTML = html;
        }

        function loadMovementsPage() {
            const area = document.getElementById('content-area');
            let html = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold">Stock Movements</h2>
                    <button onclick="showMovementModal()" class="bg-yellow-500 text-black px-6 py-3 rounded-2xl font-medium">+ New Movement</button>
                </div>
                <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                    <table class="w-full"><thead><tr class="border-b border-zinc-800"><th class="p-6 text-left">Date</th><th class="p-6 text-left">Product</th><th class="p-6">Type</th><th class="p-6 text-right">Qty</th><th class="p-6 text-left">Note</th></tr></thead><tbody id="movements-body"></tbody></table>
                </div>
            `;
            area.innerHTML = html;
            renderMovements();
        }

        function renderMovements() {
            const tbody = document.getElementById('movements-body');
            let html = '';
            movements.slice().reverse().forEach(m => {
                html += `
                    <tr class="border-b border-zinc-800">
                        <td class="p-6 text-sm">${m.date}</td>
                        <td class="p-6">${m.productName}</td>
                        <td class="p-6"><span class="${m.type==='IN' ? 'text-emerald-400' : 'text-rose-400'} font-medium">${m.type}</span></td>
                        <td class="p-6 text-right font-medium">${m.type==='IN' ? '+' : '-'}${m.qty}</td>
                        <td class="p-6 text-sm text-zinc-400">${m.note || '-'}</td>
                    </tr>`;
            });
            tbody.innerHTML = html || `<tr><td colspan="5" class="p-6 text-center text-zinc-400">No movements yet</td></tr>`;
        }

        function showMovementModal() {
            const select = document.getElementById('move-product');
            select.innerHTML = products.map(p => `<option value="${p.id}">${p.name} (${p.qty})</option>`).join('');
            document.getElementById('move-qty').value = '';
            document.getElementById('move-note').value = '';
            document.getElementById('movement-modal').classList.remove('hidden');
        }

        function closeMovementModal() {
            document.getElementById('movement-modal').classList.add('hidden');
        }

        function saveMovement() {
            const productId = parseInt(document.getElementById('move-product').value);
            const type = document.getElementById('move-type').value;
            const qty = parseInt(document.getElementById('move-qty').value);
            const note = document.getElementById('move-note').value;

            if (!qty || qty <= 0) {
                alert("Please enter valid quantity");
                return;
            }

            const product = products.find(p => p.id === productId);
            if (!product) return;

            if (type === 'OUT' && product.qty < qty) {
                alert("Not enough stock!");
                return;
            }

            product.qty += (type === 'IN' ? qty : -qty);

            movements.push({
                id: Date.now(),
                date: new Date().toLocaleDateString('en-PH'),
                productName: product.name,
                type: type,
                qty: qty,
                note: note
            });

            saveData();
            closeMovementModal();
            loadMovementsPage();
            alert("Movement recorded successfully!");
        }

        function loadReportsPage() {
            const area = document.getElementById('content-area');
            const totalValue = products.reduce((sum, p) => sum + (p.qty * p.price), 0);
            const lowStock = products.filter(p => p.qty < 15).length;

            let html = `
                <h2 class="text-2xl font-semibold mb-8">Inventory Reports</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <h3 class="text-lg mb-6">Summary</h3>
                        <div class="space-y-6">
                            <div class="flex justify-between"><span class="text-zinc-400">Total Products</span><span class="font-semibold">${products.length}</span></div>
                            <div class="flex justify-between"><span class="text-zinc-400">Total Inventory Value</span><span class="font-semibold text-emerald-400">₱${totalValue.toLocaleString('en-PH')}</span></div>
                            <div class="flex justify-between"><span class="text-zinc-400">Low Stock Items</span><span class="font-semibold text-orange-400">${lowStock}</span></div>
                            <div class="flex justify-between"><span class="text-zinc-400">Total Movements</span><span class="font-semibold">${movements.length}</span></div>
                        </div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <h3 class="text-lg mb-6">Recent Movements</h3>
                        <div id="recent-movements" class="space-y-3"></div>
                    </div>
                </div>
            `;
            area.innerHTML = html;
            renderRecentMovements();
        }

        function renderRecentMovements() {
            const container = document.getElementById('recent-movements');
            let html = '';
            movements.slice(-5).reverse().forEach(m => {
                html += `<div class="bg-zinc-800 rounded-2xl p-4 text-sm"><span class="${m.type==='IN'?'text-emerald-400':'text-rose-400'}">${m.type}</span> ${m.qty} × ${m.productName}</div>`;
            });
            container.innerHTML = html || `<p class="text-zinc-400">No movements recorded yet.</p>`;
        }

        function showAddProductModal() {
            document.getElementById('modal-title').textContent = 'Add New Product';
            document.getElementById('edit-id').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-sku').value = 'SH-' + new Date().getFullYear() + '-';
            document.getElementById('prod-qty').value = '50';
            document.getElementById('prod-price').value = '999';
            document.getElementById('prod-desc').value = '';
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            document.getElementById('modal-title').textContent = 'Edit Product';
            document.getElementById('edit-id').value = product.id;
            document.getElementById('prod-name').value = product.name;
            document.getElementById('prod-sku').value = product.sku;
            document.getElementById('prod-category').value = product.category;
            document.getElementById('prod-qty').value = product.qty;
            document.getElementById('prod-price').value = product.price;
            document.getElementById('prod-desc').value = product.desc || '';
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function saveProduct() {
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('prod-name').value.trim();
            if (!name) { alert("Product name is required!"); return; }

            if (id) {
                const product = products.find(p => p.id == id);
                if (product) {
                    product.name = name;
                    product.sku = document.getElementById('prod-sku').value;
                    product.category = document.getElementById('prod-category').value;
                    product.qty = parseInt(document.getElementById('prod-qty').value) || 0;
                    product.price = parseInt(document.getElementById('prod-price').value) || 0;
                    product.desc = document.getElementById('prod-desc').value;
                }
            } else {
                const newProduct = {
                    id: Date.now(),
                    name: name,
                    sku: document.getElementById('prod-sku').value || 'SH-' + Date.now(),
                    category: document.getElementById('prod-category').value,
                    qty: parseInt(document.getElementById('prod-qty').value) || 0,
                    price: parseInt(document.getElementById('prod-price').value) || 0,
                    desc: document.getElementById('prod-desc').value
                };
                products.unshift(newProduct);
            }

            saveData();
            closeModal();
            navigateTo('products');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        function viewProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            alert(`Product: ${p.name}\nSKU: ${p.sku}\nCategory: ${p.category}\nStock: ${p.qty} units\nPrice: ₱${p.price}\n\n${p.desc || ''}`);
        }

        loadData();
    </script>
</body>
</html>
