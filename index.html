<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockHub Cebu • Inventory Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root { --primary: 234 179 8; }
        
        .tail-container { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }

        .nav-link { transition: all 0.2s; }
        .nav-link.active { background-color: rgb(234 179 8); color: black; border-radius: 9999px; }

        .stock-bar {
            height: 6px;
            background: linear-gradient(90deg, rgb(234 179 8), rgb(245 158 11));
            border-radius: 9999px;
        }

        .modal { animation: modalPop 0.3s ease forwards; }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-[radial-gradient(at_bottom_right,#ca8a04_0%,transparent_70%)]">
        <div class="max-w-md w-full mx-4">
            <div class="bg-zinc-900 rounded-3xl shadow-2xl p-10 border border-yellow-500/20">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center gap-3 mb-4">
                        <div class="w-12 h-12 bg-yellow-500 rounded-2xl flex items-center justify-center text-black">
                            <i class="fa-solid fa-boxes-stacked text-2xl"></i>
                        </div>
                        <h1 class="logo-font text-4xl font-semibold tracking-tighter text-white">StockHub</h1>
                    </div>
                    <p class="text-zinc-400">Cebu Inventory System</p>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-2">Email or Username</label>
                        <input id="username" type="text" value="admin@stockhub.ph" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-500 text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-zinc-400 mb-2">Password</label>
                        <input id="password" type="password" value="admin123" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-yellow-500 text-white">
                    </div>
                    
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" checked class="w-4 h-4 accent-yellow-500">
                            <span class="text-zinc-400">Remember me</span>
                        </label>
                        <a href="#" class="text-yellow-500 hover:underline">Forgot password?</a>
                    </div>
                    
                    <button onclick="login()" class="w-full bg-yellow-500 hover:bg-yellow-400 transition-colors text-black font-semibold py-4 rounded-2xl text-lg">
                        Sign In
                    </button>
                </div>
            </div>
            
            <div class="text-center mt-6 text-zinc-500 text-sm">
                Created by Kim Ruiz • Cebu, Philippines
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex">
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-yellow-500 rounded-2xl flex items-center justify-center text-black">
                        <i class="fa-solid fa-boxes-stacked"></i>
                    </div>
                    <div>
                        <span class="logo-font text-3xl font-semibold tracking-tighter">StockHub</span>
                        <p class="text-[10px] text-zinc-500 -mt-1">CEBU • PHILIPPINES</p>
                    </div>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4">
                <nav class="space-y-1">
                    <a onclick="navigateTo('dashboard')" class="nav-link active flex items-center gap-3 px-4 py-3 text-sm font-medium cursor-pointer">
                        <i class="fa-solid fa-chart-line w-5"></i><span>Dashboard</span>
                    </a>
                    <a onclick="navigateTo('products')" class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium cursor-pointer">
                        <i class="fa-solid fa-list w-5"></i><span>Products</span>
                    </a>
                    <a onclick="navigateTo('movements')" class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium cursor-pointer">
                        <i class="fa-solid fa-arrows-up-down w-5"></i><span>Stock Movements</span>
                    </a>
                    <a onclick="navigateTo('reports')" class="nav-link flex items-center gap-3 px-4 py-3 text-sm font-medium cursor-pointer">
                        <i class="fa-solid fa-file-lines w-5"></i><span>Reports</span>
                    </a>
                </nav>
            </div>
            
            <div class="p-4 border-t border-zinc-800">
                <div class="flex items-center gap-3 bg-zinc-800 rounded-2xl p-3">
                    <div class="w-9 h-9 bg-zinc-700 rounded-xl flex items-center justify-center text-lg">👷</div>
                    <div class="flex-1">
                        <div class="text-sm font-medium">Kim Ruiz</div>
                        <div class="text-xs text-emerald-400">Admin • Cebu</div>
                    </div>
                    <button onclick="logout()" class="text-zinc-400 hover:text-white">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="flex-1 flex flex-col">
            <header class="bg-zinc-900 border-b border-zinc-800 px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div id="page-title" class="text-2xl font-semibold">Dashboard</div>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="relative">
                        <input id="search-input" onkeyup="if(event.key==='Enter') searchProducts()" type="text" placeholder="Search products..." 
                               class="bg-zinc-800 border border-zinc-700 focus:border-yellow-500 rounded-full pl-10 pr-4 py-3 w-80 text-sm focus:outline-none">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-zinc-500"></i>
                    </div>
                    
                    <button onclick="showAddProductModal()" class="flex items-center gap-2 bg-yellow-500 hover:bg-yellow-400 text-black px-5 py-3 rounded-2xl font-medium transition-colors">
                        <i class="fa-solid fa-plus"></i><span>New Product</span>
                    </button>
                </div>
            </header>
            
            <div class="flex-1 overflow-auto p-8 bg-zinc-950" id="content-area"></div>
        </div>
    </div>

    <div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-zinc-900 rounded-3xl w-full max-w-lg mx-4 p-8">
            <h2 id="modal-title" class="text-2xl font-semibold mb-6">Add New Product</h2>
            
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-1">Product Name</label>
                        <input id="prod-name" type="text" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-1">SKU</label>
                        <input id="prod-sku" type="text" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-1">Category</label>
                        <select id="prod-category" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                            <option>Electronics</option>
                            <option>Clothing</option>
                            <option>Home & Kitchen</option>
                            <option>Tools</option>
                            <option>Groceries</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-1">Quantity</label>
                        <input id="prod-qty" type="number" value="45" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-1">Price (₱)</label>
                        <input id="prod-price" type="number" value="1299" class="w-full bg-zinc-800 rounded-2xl px-5 py-3">
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-1">Description</label>
                    <textarea id="prod-desc" rows="3" class="w-full bg-zinc-800 rounded-3xl px-5 py-4"></textarea>
                </div>
            </div>
            
            <div class="flex gap-4 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700 hover:bg-zinc-800">Cancel</button>
                <button onclick="saveProduct()" class="flex-1 py-4 bg-yellow-500 hover:bg-yellow-400 text-black rounded-2xl font-semibold">Save Product</button>
            </div>
        </div>
    </div>

    <script>
        let products = [
            {id:1,name:"Wireless Earbuds Pro",sku:"SH-2025-001",category:"Electronics",qty:23,price:2499,desc:"Noise cancelling Bluetooth earbuds",lastUpdated:"2026-05-10"},
            {id:2,name:"Stainless Steel Tumbler",sku:"SH-2025-002",category:"Home & Kitchen",qty:8,price:899,desc:"Keeps drinks cold for 24hrs",lastUpdated:"2026-05-11"},
            {id:3,name:"Cordless Drill Kit",sku:"SH-2025-003",category:"Tools",qty:45,price:3299,desc:"18V professional kit",lastUpdated:"2026-05-09"},
            {id:4,name:"Organic Coffee Beans",sku:"SH-2025-004",category:"Groceries",qty:12,price:450,desc:"1kg pack from local Cebu farms",lastUpdated:"2026-05-12"}
        ];

        function login() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            loadDashboard();
        }
        
        function logout() {
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }
        
        function navigateTo(page) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => {
                if(link.getAttribute('onclick').includes(page)) link.classList.add('active');
            });
            
            document.getElementById('page-title').textContent = page === 'dashboard' ? 'Dashboard' : 
                                                              page === 'products' ? 'All Products' : 
                                                              page === 'movements' ? 'Stock Movements' : 'Reports';
            
            if(page==='dashboard') loadDashboard();
            else if(page==='products') loadProductsPage();
            else if(page==='movements') loadMovementsPage();
            else if(page==='reports') loadReportsPage();
        }
        
        function loadDashboard() {
            const area = document.getElementById('content-area');
            let lowStock = products.filter(p => p.qty < 15);
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="bg-zinc-900 rounded-3xl p-6 card-hover">
                        <div class="flex justify-between"><div><div class="text-sm text-zinc-400">Total Products</div><div class="text-5xl font-semibold mt-2">${products.length}</div></div><i class="fa-solid fa-boxes-stacked text-4xl text-yellow-500"></i></div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6 card-hover">
                        <div class="flex justify-between"><div><div class="text-sm text-zinc-400">Total Value</div><div class="text-5xl font-semibold mt-2">₱${products.reduce((sum, p) => sum + (p.qty * p.price), 0).toLocaleString('en-PH')}</div></div><i class="fa-solid fa-peso-sign text-4xl text-emerald-400"></i></div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6 card-hover">
                        <div class="flex justify-between"><div><div class="text-sm text-zinc-400">Low Stock Items</div><div class="text-5xl font-semibold mt-2 text-orange-400">${lowStock.length}</div></div><i class="fa-solid fa-triangle-exclamation text-4xl text-orange-400"></i></div>
                    </div>
                </div>
                <div class="mt-10">
                    <h2 class="text-xl font-semibold mb-4">Products Overview</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="dashboard-products"></div>
                </div>
            `;
            area.innerHTML = html;
            renderDashboardProducts();
        }
        
        function renderDashboardProducts() {
            const container = document.getElementById('dashboard-products');
            let html = '';
            products.slice(0,3).forEach(p => {
                html += `<div onclick="viewProduct(${p.id})" class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 cursor-pointer card-hover">
                    <div class="font-medium">${p.name}</div>
                    <div class="text-xs text-zinc-500">${p.sku}</div>
                    <div class="mt-4 flex justify-between text-xs"><span>Stock</span><span class="${p.qty<15?'text-orange-400':''}">${p.qty}</span></div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        function loadProductsPage() {
            const area = document.getElementById('content-area');
            area.innerHTML = `<div class="bg-zinc-900 rounded-3xl overflow-hidden"><table class="w-full"><thead><tr class="border-b border-zinc-800"><th class="text-left p-6">Product</th><th class="text-left p-6">SKU</th><th class="text-left p-6">Category</th><th class="text-right p-6">Stock</th><th class="text-right p-6">Price</th></tr></thead><tbody id="products-table"></tbody></table></div>`;
            renderProductsTable();
        }
        
        function renderProductsTable() {
            let html = '';
            products.forEach(p => {
                html += `<tr onclick="viewProduct(${p.id})" class="border-b border-zinc-800 hover:bg-zinc-800/50 cursor-pointer"><td class="p-6 font-medium">${p.name}</td><td class="p-6">${p.sku}</td><td class="p-6">${p.category}</td><td class="p-6 text-right ${p.qty<15?'text-orange-400':''}">${p.qty}</td><td class="p-6 text-right">₱${p.price}</td></tr>`;
            });
            document.getElementById('products-table').innerHTML = html;
        }
        
        function loadMovementsPage() {
            document.getElementById('content-area').innerHTML = `<div class="bg-zinc-900 rounded-3xl p-8"><h2 class="text-2xl font-semibold mb-6">Stock Movement History</h2><div class="space-y-4" id="movements-list"></div></div>`;
            document.getElementById('movements-list').innerHTML = `
                <div class="bg-zinc-800 rounded-2xl p-5">Wireless Earbuds Pro <span class="text-emerald-400">IN 30</span></div>
                <div class="bg-zinc-800 rounded-2xl p-5">Stainless Steel Tumbler <span class="text-rose-400">OUT 5</span></div>
            `;
        }
        
        function loadReportsPage() {
            document.getElementById('content-area').innerHTML = `<div class="bg-zinc-900 rounded-3xl p-8 text-center"><h2 class="text-2xl">Inventory Reports</h2><p class="mt-4 text-zinc-400">Total Value: ₱248,920</p></div>`;
        }
        
        function showAddProductModal() {
            document.getElementById('modal-title').textContent = 'Add New Product';
            document.getElementById('product-modal').classList.remove('hidden');
        }
        
        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }
        
        function saveProduct() {
            alert("Product saved successfully!");
            closeModal();
            navigateTo('products');
        }
        
        function viewProduct(id) {
            alert("Product details opened (demo)");
        }
        
        function searchProducts() {
            alert("Search functionality active");
        }
    </script>
</body>
</html>
